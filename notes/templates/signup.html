<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Signup • QuickNotes</title>
</head>

<body class="bg-gradient-to-br from-zinc-950 via-black to-zinc-900 min-h-screen flex items-center justify-center overflow-hidden text-white selection:bg-purple-500 selection:text-white">

    <!-- Background Glow -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-purple-500 rounded-full blur-3xl opacity-20"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-pink-500 rounded-full blur-3xl opacity-20"></div>
    <div class="absolute w-[30rem] h-[30rem] bg-blue-500 rounded-full blur-3xl opacity-10"></div>

    <!-- Signup Card -->
    <div class="relative z-10 w-full max-w-md px-6">

        <div class="bg-white/10 backdrop-blur-2xl border border-white/10 rounded-3xl p-8 shadow-2xl">

            <!-- Logo -->
            <div class="flex flex-col items-center text-center mb-8">

                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center shadow-lg shadow-purple-500/30 mb-4">
                    <span class="text-3xl">✦</span>
                </div>

                <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white via-zinc-200 to-zinc-500 bg-clip-text text-transparent">
                    QuickNotes
                </h1>

                <p class="text-zinc-400 mt-3">
                    Create your account and start writing.
                </p>

            </div>

            <!-- Form -->
            <form method="POST" class="space-y-5">

                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label class="block text-sm text-zinc-400 mb-2">
                        Username
                    </label>

                    <input 
                        type="text"
                        name="username"
                        placeholder="Choose a username"
                        class="w-full bg-white/10 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-purple-500 transition duration-300"
                    >
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm text-zinc-400 mb-2">
                        Email
                    </label>

                    <input 
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        class="w-full bg-white/10 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-300"
                    >
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm text-zinc-400 mb-2">
                        Password
                    </label>

                    <input 
                        type="password"
                        name="password"
                        placeholder="Create a password"
                        class="w-full bg-white/10 border border-white/10 rounded-2xl px-5 py-4 text-white placeholder-zinc-500 focus:outline-none focus:ring-2 focus:ring-pink-500 transition duration-300"
                    >
                </div>

                <!-- Button -->
                <button 
                    type="submit"
                    class="w-full bg-gradient-to-r from-purple-500 to-pink-500 py-4 rounded-2xl font-semibold text-lg shadow-lg shadow-purple-500/20 hover:scale-[1.02] hover:shadow-purple-500/40 transition duration-300"
                >
                    Create Account
                </button>

            </form>

            <!-- Footer -->
            <div class="text-center mt-6">

                <p class="text-zinc-400">
                    Already have an account?
                </p>

                <a href="/login/" class="text-purple-400 hover:text-pink-400 transition duration-300 font-medium">
                    Login here
                </a>

            </div>

        </div>

    </div>

</body>
</html>
